<!DOCTYPE html>

      <p class="top-text">THIS IS DON RASHID</p>

      <h1>Don Rashid</h1>

      <p class="subtitle">Global Vibes • Night Drive • No Limits</p>

      <a href="#player-section" class="listen-btn">

      <p class="player-subtitle">Play Don Rashid directly on the website.</p>

      <div class="player-card">

          src="https://open.spotify.com/embed/artist/0HbtnpVZONVd7S09jqmRZZ?utm_source=generator&theme=0"
          width="100%"
          height="352"
          frameborder="0"

  <script src="script.js"></script>
